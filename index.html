<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SoloPrice">
    
    <title>SoloPrice VFX v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --bg: #09090b;
            --card: #18181b;
            --border: #27272a;
            --primary: #3b82f6;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #fafafa;
            padding-top: env(safe-area-inset-top);
        }

        .card-solo { background: var(--card); border: 1px solid var(--border); border-radius: 1.25rem; }
        
        .btn-preset {
            background: #18181b;
            border: 1px solid #27272a;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-preset.active {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }

        input[type="range"] {
            -webkit-appearance: none;
            height: 4px;
            background: #27272a;
            accent-color: var(--primary);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: var(--primary);
            border-radius: 50%;
            border: 3px solid var(--bg);
        }

        button:active { transform: scale(0.96); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-44">

    <header class="p-6 sticky top-0 bg-[#09090b]/90 backdrop-blur-md z-50 border-b border-zinc-800">
        <div class="flex justify-between items-center max-w-lg mx-auto">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black italic">S</div>
                <div>
                    <h1 class="text-sm font-black tracking-tight leading-none uppercase">Solo<span class="text-blue-500">Price</span></h1>
                    <p class="text-[8px] text-zinc-500 font-bold uppercase tracking-widest">Calculadora de Parceria</p>
                </div>
            </div>
            <div class="text-[9px] font-bold bg-blue-500/10 text-blue-500 px-2 py-1 rounded border border-blue-500/20">V5.0 PRO</div>
        </div>
    </header>

    <main class="p-5 space-y-6 max-w-lg mx-auto">

        <!-- Novos Presets Expandidos -->
        <section class="space-y-3">
            <label class="text-[10px] font-black text-zinc-500 uppercase tracking-widest ml-1">Configuração do Projeto</label>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setPreset('reels_vfx')" id="btn-reels_vfx" class="btn-preset p-3 rounded-xl text-left text-[11px] font-bold">📱 Reels VFX/Retenção</button>
                <button onclick="setPreset('ugc_ads')" id="btn-ugc_ads" class="btn-preset p-3 rounded-xl text-left text-[11px] font-bold">🎯 UGC / Ads Venda</button>
                <button onclick="setPreset('yt_std')" id="btn-yt_std" class="btn-preset p-3 rounded-xl text-left text-[11px] font-bold">📺 YouTube Standard</button>
                <button onclick="setPreset('yt_doc')" id="btn-yt_doc" class="btn-preset p-3 rounded-xl text-left text-[11px] font-bold">🎬 YouTube Doc/Story</button>
                <button onclick="setPreset('podcast')" id="btn-podcast" class="btn-preset p-3 rounded-xl text-left text-[11px] font-bold">🎙️ Podcast / Talk</button>
                <button onclick="setPreset('raw_cut')" id="btn-raw_cut" class="btn-preset p-3 rounded-xl text-left text-[11px] font-bold">✂️ Decupagem Solo</button>
            </div>
        </section>

        <!-- Detalhes Automáticos -->
        <section class="card-solo p-4 space-y-3">
            <div>
                <h3 class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-2">Entregáveis do Pacote:</h3>
                <ul id="incList" class="text-[11px] text-zinc-400 space-y-1">
                    <!-- JS -->
                </ul>
            </div>
            <div class="pt-3 border-t border-zinc-800 flex justify-between items-center">
                <span class="text-[10px] font-bold text-zinc-500 uppercase">Prazo de Entrega:</span>
                <span id="turnaroundText" class="text-[11px] font-bold text-emerald-400">---</span>
            </div>
        </section>

        <!-- Duração -->
        <section class="card-solo p-5">
            <div class="flex justify-between items-center mb-4">
                <label class="text-xs font-bold text-zinc-400 uppercase">Duração do Vídeo</label>
                <span id="durLabel" class="text-blue-500 font-black text-lg italic">1 min</span>
            </div>
            <input type="range" id="duration" min="1" max="30" value="1" class="w-full">
            <div class="flex justify-between text-[9px] mt-2 text-zinc-600 font-bold uppercase">
                <span>Fast</span>
                <span>30 Minutos</span>
            </div>
        </section>

        <!-- Modificadores -->
        <section class="grid grid-cols-1 gap-2">
            <div onclick="toggleCheck('hasRec')" class="card-solo p-4 flex justify-between items-center cursor-pointer active:bg-zinc-800/50">
                <div>
                    <p class="text-sm font-bold">Gravação Externa</p>
                    <p class="text-[10px] text-zinc-500">Logística + Diária de Câmera</p>
                </div>
                <input type="checkbox" id="hasRec" class="w-5 h-5 accent-blue-500">
            </div>

            <div onclick="toggleCheck('isUrgent')" class="card-solo p-4 flex justify-between items-center cursor-pointer active:bg-zinc-800/50">
                <div>
                    <p class="text-sm font-bold text-orange-500 italic">🚨 Entrega Urgente</p>
                    <p class="text-[10px] text-zinc-500">Prioridade na fila (+35%)</p>
                </div>
                <input type="checkbox" id="isUrgent" class="w-5 h-5 accent-orange-500">
            </div>
        </section>

    </main>

    <!-- Preço e Copiar -->
    <footer class="fixed bottom-0 left-0 right-0 p-6 pb-12 bg-zinc-900 border-t border-zinc-800 rounded-t-[35px] shadow-2xl z-50">
        <div class="max-w-lg mx-auto flex items-center justify-between gap-6">
            <div class="flex-1">
                <p class="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-1">Investimento</p>
                <div id="priceBRL" class="text-2xl font-black text-white leading-none mb-1">R$ 0,00</div>
                <div id="priceUSD" class="text-sm font-bold text-blue-500 opacity-80">$ 0.00</div>
            </div>
            <button onclick="copyFullProposal()" id="copyBtn" class="bg-blue-600 active:bg-blue-700 text-white font-black px-6 py-4 rounded-xl text-[10px] uppercase tracking-widest transition-all">
                Copiar Proposta
            </button>
        </div>
    </footer>

    <script>
        const PRESETS = {
            reels_vfx: {
                name: "Reels/Shorts VFX & Retenção",
                items: ["Motion Graphics & VFX", "Sound Design imersivo", "Legendas premium", "Hooks agressivos"],
                base: { brl: 450, usd: 100 }, extra: { brl: 100, usd: 25 }, days: 3
            },
            ugc_ads: {
                name: "UGC / Ads de Alta Conversão",
                items: ["Edição focada em vendas", "Call to action animado", "Cortes rápidos/modernos", "Tratamento de voz"],
                base: { brl: 350, usd: 80 }, extra: { brl: 80, usd: 20 }, days: 2
            },
            yt_std: {
                name: "YouTube Standard (Solo)",
                items: ["Corte narrativo A-Roll", "Curadoria básica de B-Roll", "Mixagem de áudio", "Color grading básico"],
                base: { brl: 300, usd: 75 }, extra: { brl: 50, usd: 12 }, days: 4
            },
            yt_doc: {
                name: "YouTube Estilo Documentário",
                items: ["Storytelling avançado", "Sound design cinematográfico", "Tratamento de cor premium", "Pesquisa extensiva de B-Roll"],
                base: { brl: 800, usd: 180 }, extra: { brl: 150, usd: 35 }, days: 7
            },
            podcast: {
                name: "Podcast / Long-form Edit",
                items: ["Troca de câmeras (Multicam)", "Remoção de ruídos/erros", "Vinhetas e trilhas", "Equalização de áudio"],
                base: { brl: 250, usd: 60 }, extra: { brl: 30, usd: 8 }, days: 3
            },
            raw_cut: {
                name: "Decupagem & Limpeza Solo",
                items: ["Sincronia Áudio/Vídeo", "Seleção dos melhores takes", "Remoção de silêncios", "Arquivo organizado"],
                base: { brl: 120, usd: 30 }, extra: { brl: 20, usd: 5 }, days: 2
            }
        };

        let currentKey = 'reels_vfx';

        function setPreset(key) {
            currentKey = key;
            document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${key}`).classList.add('active');
            
            const p = PRESETS[key];
            document.getElementById('incList').innerHTML = p.items.map(i => `<li>• ${i}</li>`).join('');
            
            update();
        }

        function toggleCheck(id) {
            const cb = document.getElementById(id);
            cb.checked = !cb.checked;
            update();
        }

        function update() {
            const dur = parseInt(document.getElementById('duration').value);
            const hasRec = document.getElementById('hasRec').checked;
            const urgent = document.getElementById('isUrgent').checked;
            const p = PRESETS[currentKey];

            document.getElementById('durLabel').innerText = `${dur} min`;

            // Preço base + adicional por min
            let brl = p.base.brl + (dur - 1) * p.extra.brl;
            let usd = p.base.usd + (dur - 1) * p.extra.usd;

            if (hasRec) { brl += 400; usd += 80; }
            if (urgent) { brl *= 1.35; usd *= 1.35; }

            // Turnaround logic
            let finalDays = p.days;
            if (dur > 5) finalDays += Math.floor(dur / 5);
            if (urgent) finalDays = Math.max(1, Math.ceil(finalDays / 2.5));
            
            document.getElementById('turnaroundText').innerText = `${finalDays} dia${finalDays > 1 ? 's' : ''} úteis`;
            document.getElementById('priceBRL').innerText = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(brl);
            document.getElementById('priceUSD').innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(usd);
        }

        function copyFullProposal() {
            const p = PRESETS[currentKey];
            const dur = document.getElementById('duration').value;
            const brl = document.getElementById('priceBRL').innerText;
            const usd = document.getElementById('priceUSD').innerText;
            const days = document.getElementById('turnaroundText').innerText;
            const urgent = document.getElementById('isUrgent').checked;

            const text = `*PROPOSTA DE EDIÇÃO - SOLO V5*\n` +
                         `--------------------------------\n` +
                         `📌 *Serviço:* ${p.name}\n` +
                         `⏱️ *Tempo de Vídeo:* ${dur} min\n` +
                         `📅 *Prazo de Entrega:* ${days}\n` +
                         `${urgent ? '🚨 *PRIORIDADE:* Atendimento Urgente\n' : ''}` +
                         `--------------------------------\n` +
                         `*Entregáveis Inclusos:*\n` +
                         p.items.map(i => `  ✅ ${i}`).join('\n') +
                         `\n--------------------------------\n` +
                         `💰 *INVESTIMENTO:*\n` +
                         `🇧🇷 ${brl} (BRL)\n` +
                         `🇺🇸 ${usd} (USD)\n` +
                         `--------------------------------\n` +
                         `_Condições: 50% reserva / 50% entrega._\n` +
                         `_Ajustes: Até 2 rodadas inclusas._`;

            const btn = document.getElementById('copyBtn');
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            btn.innerText = "COPIADO! ✅";
            btn.classList.replace('bg-blue-600', 'bg-emerald-600');
            setTimeout(() => { 
                btn.innerText = "COPIAR PROPOSTA"; 
                btn.classList.replace('bg-emerald-600', 'bg-blue-600');
            }, 1500);
        }

        document.getElementById('duration').addEventListener('input', update);
        document.getElementById('hasRec').addEventListener('change', update);
        document.getElementById('isUrgent').addEventListener('change', update);

        setPreset('reels_vfx');
    </script>
</body>
</html>
